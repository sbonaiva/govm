version: 2

before:
    hooks:
        - go mod tidy
        - go mod verify

builds:
    - main: ./cmd/govm
      binary: govm
      ldflags: "-s -w -X main.Version={{.Version}}"
      env:
          - CGO_ENABLED=0
      goos:
          - linux
          - darwin

archives:
    - name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
      formats: ["tar.gz"]

snapshot:
    version_template: "{{.Version}}"

checksum:
  name_template: "{{ .ProjectName }}_checksums.txt"

changelog:
    sort: asc
    filters:
        exclude:
            - "^docs:"
            - "^test:"

homebrew_casks:
    - name: govm
      description: "Go Version Manager (govm) simplifies the management of Go installations."
      homepage: "https://github.com/sbonaiva/govm"

      url:
          template: "https://github.com/sbonaiva/govm/releases/download/{{ .Tag }}/{{ .ArtifactName }}"

      zap:
          trash:
              - "~/.govm"

      repository:
          owner: sbonaiva
          name: homebrew-tap
          branch: main
          token: "{{ .Env.GH_PAT_TOKEN }}"

      commit_msg_template: "Brew cask update for {{ .ProjectName }} version {{ .Tag }}"

nix:
    - name: govm
      url_template: "https://github.com/sbonaiva/govm/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
      commit_msg_template: "{{ .ProjectName }}: {{ .Tag }}"
      homepage: "https://github.com/sbonaiva/govm"
      description: "Go Version Manager (govm) simplifies the management of Go installations."
      path: pkgs/development/tools/govm/default.nix
      license: "asl20"

      dependencies:
          - gnutar

      repository:
          owner: sbonaiva
          name: nixpkgs
          branch: main
          token: "{{ .Env.GH_PAT_TOKEN }}"
